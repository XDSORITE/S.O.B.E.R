<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SOBER Backend Test UI</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

    body {
      margin: 0;
      font-family: 'Inter', Arial, Helvetica, sans-serif;
      background: radial-gradient(circle at top, #0b1a33, #050a14 60%);
      color: #e6eef8;
      overflow-x: hidden;
    }

    .wrap {
      max-width: 1200px;
      margin: 24px auto;
      padding: 18px;
    }

    .panel {
      background: rgba(10, 16, 30, 0.65);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 16px;
      padding: 18px;
      backdrop-filter: blur(12px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.35);
      transition: transform 0.2s ease;
    }

    .panel:hover {
      transform: translateY(-1px);
    }

    h2, h4 {
      letter-spacing: 0.3px;
      font-weight: 600;
    }

    .controls {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    input[type="text"], input[type="number"] {
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.04);
      color: inherit;
      outline: none;
      transition: 0.2s;
    }

    input:focus {
      border-color: #58d6c9;
      box-shadow: 0 0 0 3px rgba(88,214,201,0.15);
    }

    button {
      padding: 10px 14px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      font-weight: 500;
      transition: 0.2s ease;
    }

    button:hover {
      transform: translateY(-1px);
      opacity: 0.95;
    }

    button.primary {
      background: linear-gradient(135deg, #58d6c9, #4aa3ff);
      color: #04151c;
      font-weight: 600;
      box-shadow: 0 6px 18px rgba(88,214,201,0.25);
    }

    .row {
      display: flex;
      gap: 10px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }

    #map {
      height: 520px;
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }

    pre {
      background: rgba(0,0,0,0.35);
      padding: 10px;
      border-radius: 10px;
      overflow: auto;
      max-height: 220px;
      border: 1px solid rgba(255,255,255,0.05);
    }

    strong {
      color: #cfe6ff;
    }

    label {
      font-size: 14px;
      opacity: 0.9;
    }

    @media(max-width: 860px) {
      .row { flex-direction: column; }
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="panel">
      <h2 style="margin:0 0 10px">SOBER Test UI</h2>

      <div class="controls">
        <label style="display:flex;gap:8px;align-items:center">
          Backend URL
          <input id="baseUrl" type="text" value="http://127.0.0.1:5000" style="width:260px;margin-left:8px" />
        </label>
        <button id="healthBtn" class="primary">Health</button>
        <button id="loadSampleBtn">Load Sample</button>
        <span id="healthStatus" style="margin-left:12px;color:#97a6c6">idle</span>
      </div>

      <div class="row">
        <div style="flex:1">
          <h4 style="margin:10px 0">Risk</h4>
          <div class="row">
            <input id="riskLat" type="number" step="any" placeholder="lat" />
            <input id="riskLon" type="number" step="any" placeholder="lon" />
            <button id="riskBtn" class="primary">Call /risk</button>
          </div>

          <h4 style="margin:10px 0">Safe Route</h4>
          <div class="row">
            <input id="olat" type="number" step="any" placeholder="origin lat" />
            <input id="olon" type="number" step="any" placeholder="origin lon" />
            <input id="dlat" type="number" step="any" placeholder="dest lat" />
            <input id="dlon" type="number" step="any" placeholder="dest lon" />
            <button id="routeBtn" class="primary">Call /safe_route</button>
          </div>

          <h4 style="margin:10px 0">Heatmap</h4>
          <div class="row">
            <input id="h_lat1" type="number" step="any" placeholder="lat1" />
            <input id="h_lon1" type="number" step="any" placeholder="lon1" />
            <input id="h_lat2" type="number" step="any" placeholder="lat2" />
            <input id="h_lon2" type="number" step="any" placeholder="lon2" />
            <input id="h_grid" type="number" step="1" min="2" max="8" placeholder="grid" style="width:80px" />
            <button id="heatBtn" class="primary">Call /heatmap</button>
          </div>
        </div>

        <div style="width:420px">
          <h4 style="margin:10px 0">Responses</h4>
          <div style="display:grid;gap:10px">
            <div>
              <strong>Risk</strong>
              <pre id="riskOutput">no call yet</pre>
            </div>
            <div>
              <strong>Route</strong>
              <pre id="routeOutput">no call yet</pre>
            </div>
            <div>
              <strong>Heatmap</strong>
              <pre id="heatOutput">no call yet</pre>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="panel" style="margin-top:14px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <strong>Map (click to set risk point)</strong>
        <div>
          <button id="centerMapBtn">Reset View</button>
          <button id="plotInputsBtn" class="primary">Plot Inputs</button>
        </div>
      </div>
      <div id="map"></div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>

  <!-- JS unchanged -->
  <script>
    const baseUrlInput = document.getElementById('baseUrl');
    const healthBtn = document.getElementById('healthBtn');
    const healthStatus = document.getElementById('healthStatus');
    const loadSampleBtn = document.getElementById('loadSampleBtn');

    const riskLatInput = document.getElementById('riskLat');
    const riskLonInput = document.getElementById('riskLon');
    const riskBtn = document.getElementById('riskBtn');
    const riskOutput = document.getElementById('riskOutput');

    const olat = document.getElementById('olat');
    const olon = document.getElementById('olon');
    const dlat = document.getElementById('dlat');
    const dlon = document.getElementById('dlon');
    const routeBtn = document.getElementById('routeBtn');
    const routeOutput = document.getElementById('routeOutput');
    const h_lat1 = document.getElementById('h_lat1');
    const h_lon1 = document.getElementById('h_lon1');
    const h_lat2 = document.getElementById('h_lat2');
    const h_lon2 = document.getElementById('h_lon2');
    const h_grid = document.getElementById('h_grid');
    const heatBtn = document.getElementById('heatBtn');
    const heatOutput = document.getElementById('heatOutput');

    function baseUrl(){ return baseUrlInput.value.replace(/\/$/, '') }
    function setStatus(t){ healthStatus.textContent = t }

    async function requestJson(path){
      const res = await fetch(baseUrl() + path);
      const text = await res.text();
      try{ return JSON.parse(text) }catch{ return {raw:text} }
    }

    healthBtn.addEventListener('click', async ()=>{
      setStatus('checking...')
      try{ const d = await requestJson('/health'); setStatus('ok'); console.log(d) }catch(e){ setStatus('failed') }
    })

    loadSampleBtn.addEventListener('click', ()=>{
      riskLatInput.value = 40.7128; riskLonInput.value = -74.0060;
      olat.value = 40.7128; olon.value = -74.0060;
      dlat.value = 40.7580; dlon.value = -73.9855;
      setStatus('sample loaded')
      placeRiskMarker(40.7128,-74.0060)
    })

    const map = L.map('map').setView([40.7128,-74.0060], 12);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{maxZoom:19, attribution:'© OpenStreetMap © CARTO'}).addTo(map);
    const layers = { risk: L.layerGroup().addTo(map), route: L.layerGroup().addTo(map), heat: L.layerGroup().addTo(map) };

    function placeRiskMarker(lat,lon,popup){
      layers.risk.clearLayers();
      L.marker([lat,lon]).addTo(layers.risk).bindPopup(popup||'risk').openPopup();
      map.panTo([lat,lon])
    }

    map.on('click', e=>{
      const c = e.latlng;
      riskLatInput.value = c.lat.toFixed(5);
      riskLonInput.value = c.lng.toFixed(5);
      placeRiskMarker(c.lat,c.lng,'selected')
    })

    document.getElementById('centerMapBtn').addEventListener('click', ()=> map.setView([40.7128,-74.0060],12))
  </script>
</body>
</html>
